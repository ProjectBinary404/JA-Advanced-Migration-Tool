name: Joomla CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-test:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: joomla
          MYSQL_USER: joomla
          MYSQL_PASSWORD: joomla
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -uroot -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

      joomla:
        image: joomla:6.0-php8.3-apache
        ports:
          - 8080:80
        env:
          JOOMLA_DB_HOST: mysql
          JOOMLA_DB_USER: joomla
          JOOMLA_DB_PASSWORD: joomla
          JOOMLA_DB_NAME: joomla

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, intl, mysqli
          coverage: none

      - name: Install Composer dependencies
        run: composer install --prefer-dist --no-progress

      - name: Wait for MySQL
        run: |
          for i in {1..30}; do
            if mysqladmin ping -h127.0.0.1 -P3306 -uroot -proot --silent; then
              echo "✅ MySQL is ready"
              exit 0
            fi
            echo "⏳ Waiting for MySQL..."
            sleep 5
          done
          echo "❌ MySQL not ready in time"
          exit 1

      - name: Wait for Joomla Installer
        run: |
          for i in {1..30}; do
            if curl -f http://localhost:8080/installation/index.php > /dev/null 2>&1; then
              echo "✅ Joomla installer is ready"
              exit 0
            fi
            echo "⏳ Waiting for Joomla installer..."
            sleep 10
          done
          echo "❌ Joomla installer did not become ready in time"
          exit 1

      - name: Run PHPUnit tests
        run: composer test

      - name: Run Cypress Installer Test
        run: npx cypress run --spec "cypress/e2e/installation.cy.js"
        env:
          JOOMLA_BASE_URL: http://localhost:8080
          JOOMLA_ADMIN_USER: admin
          JOOMLA_ADMIN_PASS: admin123

      - name: Run Cypress Component Tests
        run: npx cypress run --spec "cypress/e2e/**/*.cy.js"
        env:
          JOOMLA_BASE_URL: http://localhost:8080
          JOOMLA_ADMIN_USER: admin
          JOOMLA_ADMIN_PASS: admin123
