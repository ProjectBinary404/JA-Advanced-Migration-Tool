name: CI and Release

on:
  push:
    branches: [main, cypress-testing-beta]
  pull_request:
    branches: [main, cypress-testing-beta]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: joomla
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -uroot -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

      joomla:
        image: joomla:6.0-php8.3-apache
        env:
          JOOMLA_DB_HOST: mysql
          JOOMLA_DB_USER: root
          JOOMLA_DB_PASSWORD: root
          JOOMLA_DB_NAME: joomla
        ports:
          - 8080:80
        options: >-
          --health-cmd="curl -f http://localhost/installation/index.php || exit 1"
          --health-interval=15s
          --health-timeout=10s
          --health-retries=20

    steps:
      - uses: actions/checkout@v4

      - name: Copy configuration.php into Joomla container
        run: |
          docker cp ./configuration.php $(docker ps -qf "ancestor=joomla:6.0-php8.3-apache"):/var/www/html/configuration.php

      - name: Seed Joomla DB
        run: |
          docker exec $(docker ps -qf "ancestor=mysql:8") \
            mysql -uroot -proot joomla <<'EOF'
            INSERT INTO jos_users (id, name, username, email, password, params)
              VALUES (991, 'Super User', 'admin', 'admin@example.com',
                '$2y$10$wV9.dba1vILz8e/u7JmLleS1Dwb3XLCza36/bvtxjFBXHW6ayLuFu', '{}');
            INSERT INTO jos_user_usergroup_map (user_id, group_id)
              VALUES (991, 8);
          EOF

      - name: Create jos_postinstall_messages table if not exists
        run: |
          docker exec $(docker ps -qf "ancestor=mysql:8") \
            mysql -uroot -proot joomla -e "CREATE TABLE IF NOT EXISTS jos_postinstall_messages (postinstall_message_id bigint(20) unsigned NOT NULL AUTO_INCREMENT, extension_id bigint(20) NOT NULL DEFAULT '0', title_key varchar(255) NOT NULL DEFAULT '', description_key varchar(255) NOT NULL DEFAULT '', action_key varchar(255) DEFAULT '', language_extension varchar(255) NOT NULL DEFAULT 'com_postinstall', language_client_id tinyint(3) NOT NULL DEFAULT '1', type enum('message','action') NOT NULL DEFAULT 'message', action_file varchar(255) DEFAULT '', action varchar(255) DEFAULT '', condition_file varchar(255) DEFAULT '', condition_method varchar(255) DEFAULT '', version_introduced varchar(50) NOT NULL DEFAULT '', enabled tinyint(3) NOT NULL DEFAULT '1', PRIMARY KEY (postinstall_message_id), KEY idx_enabled (enabled), KEY idx_condition (condition_file,condition_method)) ENGINE=InnoDB DEFAULT CHARSET=utf8mb4 DEFAULT COLLATE=utf8mb4_unicode_ci;"

      - name: Disable Joomla Guided Tours
        run: |
          docker exec $(docker ps -qf "ancestor=mysql:8") \
            mysql -uroot -proot joomla -e "UPDATE jos_postinstall_messages SET enabled = 0;"

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          extensions: zip, mysqli, pdo_mysql

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.11.1"

      - name: Install Composer dependencies
        run: composer install --no-progress --prefer-dist --optimize-autoloader

      - name: Install NPM dependencies
        run: npm install

      - name: Wait for Joomla installer to be ready
        run: |
          for i in {1..40}; do
            if curl -f http://localhost:8080/installation/index.php > /dev/null 2>&1; then
              echo "✅ Joomla installer is ready"
              break
            fi
            echo "⏳ Waiting for Joomla installer..."
            sleep 10
          done

      - name: Set Joomla env
        run: |
          echo "JOOMLA_BASE_URL=http://localhost:8080" >> $GITHUB_ENV
          echo "JOOMLA_ADMIN_USER=admin" >> $GITHUB_ENV
          echo "JOOMLA_ADMIN_PASS=admin123423454664@" >> $GITHUB_ENV

      - name: Run tests
        run: composer test
        env:
          JOOMLA_BASE_URL: http://localhost:8080
          JOOMLA_ADMIN_USER: admin
          JOOMLA_ADMIN_PASS: admin123423454664@
          DBUS_SESSION_BUS_ADDRESS: /dev/null

      - name: Get version from XML
        id: get_version
        run: |
          VERSION=$(grep -oP '(?<=<version>)[^<]+' src/component/cmsmigrator.xml)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Get latest tag and increment
        id: increment_version
        run: |
          LATEST_TAG=$(git tag --sort=-version:refname | head -1 | sed 's/v//')
          if [ -z "$LATEST_TAG" ]; then
            NEW_VERSION="0.0.1"
          else
            IFS='.' read -r major minor patch <<< "$LATEST_TAG"
            NEW_VERSION="$major.$minor.$((patch + 1))"
          fi
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT

      - name: Create component zip
        run: |
          cd src/component
          zip -r ../../cypress/fixtures/com_cmsmigrator.zip .

      - name: Rename zip with version
        run: |
          mv cypress/fixtures/com_cmsmigrator.zip cypress/fixtures/com_cmsmigrator_v${{ steps.increment_version.outputs.new_version }}.zip

      - name: Update XML version
        run: |
          sed -i "s|<version>.*</version>|<version>${{ steps.increment_version.outputs.new_version }}</version>|" src/component/cmsmigrator.xml

      - name: Commit version update
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add src/component/cmsmigrator.xml
          git commit -m "Bump version to ${{ steps.increment_version.outputs.new_version }}"
          git push

      - name: Create Release
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run:
          gh release create v${{ steps.increment_version.outputs.new_version }} \
          cypress/fixtures/com_cmsmigrator_v${{ steps.increment_version.outputs.new_version }}.zip \
          --title "Release v${{ steps.increment_version.outputs.new_version }}" \
          --notes "Automated release of Joomla Advanced Migration Tool v${{ steps.increment_version.outputs.new_version }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
